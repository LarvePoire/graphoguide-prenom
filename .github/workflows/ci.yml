name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ai_claude
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ai_claude_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TZ: UTC
      PORT: 3333
      HOST: localhost
      APP_URL: http://localhost:3333
      LOG_LEVEL: info
      NODE_ENV: test
      APP_KEY: ${{ secrets.APP_KEY }}
      SESSION_DRIVER: cookie
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: ai_claude
      DB_PASSWORD: password
      DB_DATABASE: ai_claude_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run migrations
        run: node ace migration:run --force
        working-directory: build

      - name: Tests
        run: node ace test
        working-directory: build
